{% extends 'dashboard/base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-xl font-bold text-gray-900">📅 Study Schedule</h2>
            <a href="{% url 'dashboard' %}" class="p-2 hover:bg-gray-100 rounded-lg transition-colors text-gray-500">✕</a>
        </div>
        <div class="p-6 space-y-4">
            {% for day in days %}
            <div class="p-4 border-2 border-gray-100 rounded-xl hover:border-red-200 transition-all">
                <div class="font-bold text-sm text-gray-900 mb-2">{{ day }}</div>
                <div class="space-y-2">
                    <div class="text-xs text-gray-600 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span>
                        9:00 AM - Database Class
                    </div>
                    <div class="text-xs text-gray-600 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                        2:00 PM - Study Session
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
